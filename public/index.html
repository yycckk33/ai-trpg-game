<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI TRPG</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      max-width: 1400px;
      margin: 30px auto;
      font-family: "맑은 고딕", sans-serif;
      line-height: 1.7;
      padding: 20px;
      color: #222;
      background: #fafafa;
    }

    h1, h2 {
      margin-top: 0;
    }

    #gameScreen {
      display: none;
    }

    .panel {
      border: 1px solid #aaa;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 8px;
      background: #fff;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 300px;
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .game-grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 4px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      margin: 4px 0;
      border: 1px solid #777;
      border-radius: 6px;
      background: #f2f2f2;
    }

    button:hover {
      background: #e6e6e6;
    }

    #story {
      white-space: pre-wrap;
      word-break: keep-all;
      border: 1px solid #aaa;
      padding: 20px;
      min-height: 320px;
      background: #f8f8f8;
    }

    #playerInfo,
    #inventoryInfo,
    #combatInfo,
    #shopInfo {
      white-space: pre-wrap;
      word-break: keep-all;
    }

    #combatBox {
      display: none;
      border: 2px solid #b00000;
      background: #fff5f5;
    }

    #shopBox {
      display: none;
      border: 2px solid #b58a00;
      background: #fffaf0;
    }

    #choiceButtons button,
    #inventoryButtons button,
    #shopButtons button {
      display: block;
      width: 100%;
      text-align: left;
      margin: 8px 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .input-row input {
      flex: 1;
      min-width: 220px;
    }

    .section-gap {
      margin-top: 14px;
    }

    .small-text {
      font-size: 14px;
      color: #555;
    }

    .right-column {
      position: sticky;
      top: 20px;
    }

    @media (max-width: 1100px) {
      .right-column {
        position: static;
      }
    }
  </style>
</head>

<body>
  <div id="startScreen" class="panel">
    <h1>AI TRPG</h1>

    <p>
      이곳은 흔히 아는 몬스터가 나타나는 판타지 RPG의 세계이며,
      당신은 중대한 목표를 가지고 있습니다.
    </p>

    <div class="section-gap">
      <label for="nameInput">플레이어 이름</label>
      <input id="nameInput" placeholder="예: 레온">
    </div>

    <div class="section-gap">
      <label for="jobInput">직업</label>
      <input id="jobInput" placeholder="예: 마법사, 광대, 바나나 판매상">
    </div>

    <div class="section-gap">
      <label for="worldInput">세계관 설명</label>
      <textarea id="worldInput">이곳은 흔히 아는 몬스터가 나타나는 판타지 RPG의 세계이며, 당신은 중대한 목표를 가지고 있습니다.</textarea>
      <div class="small-text">
        세계관을 바꾸고 싶으면 이 문장을 직접 수정하면 돼.
      </div>
    </div>

    <div class="section-gap">
      <label for="personalityInput">캐릭터 성격</label>
      <textarea id="personalityInput" placeholder="예: 온순하고 착하다 / 싸가지 없고 충동적이다 / 냉정하고 계산적이다"></textarea>
    </div>

    <div class="section-gap">
      <label for="goalInput">중대한 목표</label>
      <textarea id="goalInput" placeholder="당신의 중대한 목표는 무엇입니까?"></textarea>
    </div>

    <div class="section-gap">
      <button onclick="startGame()">게임 시작</button>
    </div>
  </div>

  <div id="gameScreen">
    <h1>AI TRPG</h1>

    <div class="game-grid">
      <div>
        <div class="panel">
          <h2>플레이어 정보</h2>
          <div id="playerInfo"></div>
          <hr>
          <div id="turn">턴: 1</div>
          <div id="dice">주사위: -</div>
        </div>

        <div id="inventoryBox" class="panel">
          <h2>인벤토리</h2>
          <div id="inventoryInfo">없음</div>
          <div id="inventoryButtons"></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <h2>이야기</h2>
          <div id="story">게임 시작</div>

          <div class="input-row">
            <input id="choiceInput" placeholder="직접 행동 입력">
            <button onclick="sendChoice()">진행</button>
            <button onclick="resetGame()">새 게임</button>
          </div>
        </div>

        <div class="panel">
          <h2>선택지</h2>
          <div id="choiceButtons"></div>
        </div>
      </div>

      <div class="right-column">
        <div id="combatBox" class="panel">
          <h2>전투 중</h2>
          <div id="combatInfo"></div>
        </div>

        <div id="shopBox" class="panel">
          <h2>상점</h2>
          <div id="shopInfo"></div>
          <div id="shopButtons"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
